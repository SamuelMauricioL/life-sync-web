<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎯 Dispara al Objetivo</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#8b5cf6,#3b82f6,#14b8a6);
    overflow:hidden;
    text-align:center;
    color:white;
}

h1{
    margin-top:20px;
}

#puntos{
    font-size:25px;
    margin-top:10px;
}

#tiempo{
    font-size:25px;
    margin-top:10px;
}

#objetivo{
    position:absolute;
    font-size:70px;
    cursor:pointer;
}

#final{
    display:none;
    margin-top:100px;
    font-size:30px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#7c3aed;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

a{
    text-decoration:none;
}

</style>

</head>

<body>

<h1>🎯 Dispara al Objetivo</h1>

<div id="puntos">
Puntos: 0
</div>

<div id="tiempo">
Tiempo: 30
</div>

<div id="objetivo">
🎯
</div>

<div id="final">

🏆 Juego Terminado

<br><br>

<p id="resultadoFinal"></p>

<button onclick="location.reload()">
🔄 Jugar otra vez
</button>

<a href="juego6.html">
<button>
➡️ Siguiente Juego
</button>
</a>

</div>

<script>

let puntos = 0;
let tiempo = 30;

const objetivo =
document.getElementById("objetivo");

function moverObjetivo(){

let x =
Math.random() * (window.innerWidth - 100);

let y =
Math.random() * (window.innerHeight - 150);

objetivo.style.left = x + "px";
objetivo.style.top = y + "px";

}

objetivo.onclick = function(){

puntos++;

document.getElementById("puntos").innerHTML =
"Puntos: " + puntos;

moverObjetivo();

};

moverObjetivo();

let contador = setInterval(function(){

tiempo--;

document.getElementById("tiempo").innerHTML =
"Tiempo: " + tiempo;

if(tiempo <= 0){

clearInterval(contador);

objetivo.style.display = "none";

document.getElementById("final").style.display = "block";

document.getElementById("resultadoFinal").innerHTML =
"⭐ Tu puntuación fue: " + puntos;

}

},1000);

</script>

</body>

</html>
