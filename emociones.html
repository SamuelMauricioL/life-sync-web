<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naomi Miranda - LifeSync</title>

<style>

body{
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right, #8b5cf6, #3b82f6, #14b8a6);
}

.contenedor{
    width: 80%;
    max-width: 900px;
    margin: 40px auto;
    background-color: white;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.25);
}

h1{
    text-align: center;
    color: #6d28d9;
    font-size: 45px;
}

p{
    text-align: center;
    color: #475569;
    font-size: 18px;
}

label{
    display: block;
    margin-top: 20px;
    font-weight: bold;
    color: #5b21b6;
}

select, textarea{
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 12px;
    border: 2px solid #c4b5fd;
    font-size: 16px;
    box-sizing: border-box;
}

textarea{
    resize: none;
}

button{
    margin-top: 30px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 15px;
    background-color: #7c3aed;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

a{
    text-decoration: none;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>😊 Registro Emocional</h1>

<p>
Completa esta pequeña encuesta emocional.
</p>

<label>¿Cómo te sientes hoy?</label>

<select>

<option>😄 Feliz</option>

<option>😢 Triste</option>

<option>😫 Estresado</option>

<option>😎 Motivado</option>

</select>

<label>¿Qué ocurrió hoy?</label>

<textarea rows="5"
placeholder="Escribe cómo fue tu día..."></textarea>

<a href="emociones2.html">

<button>
💜 Continuar
</button>

</a>

</div>

</body>

</html>
