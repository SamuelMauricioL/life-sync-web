<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atrapa la Estrella</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#8b5cf6,#3b82f6,#14b8a6);
    overflow:hidden;
}

.contenedor{
    text-align:center;
    color:white;
    padding-top:20px;
}

h1{
    font-size:45px;
}

#puntos{
    font-size:25px;
    margin:15px;
}

#estrella{
    position:absolute;
    font-size:60px;
    cursor:pointer;
    transition:0.2s;
}

.boton{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:15px 25px;
    border:none;
    border-radius:15px;
    background:#7c3aed;
    color:white;
    font-size:18px;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>⭐ Atrapa la Estrella ⭐</h1>

<p>
Haz clic sobre la estrella todas las veces que puedas.
</p>

<div id="puntos">
Puntos: 0
</div>

</div>

<div id="estrella">
⭐
</div>

<a href="juego2.html" class="boton">
➡️ Siguiente Juego
</a>

<script>

let puntos = 0;

const estrella =
document.getElementById("estrella");

const marcador =
document.getElementById("puntos");

function moverEstrella(){

let x =
Math.random() *
(window.innerWidth - 100);

let y =
Math.random() *
(window.innerHeight - 100);

estrella.style.left = x + "px";
estrella.style.top = y + "px";

}

estrella.addEventListener("click",()=>{

puntos++;

marcador.innerHTML =
"Puntos: " + puntos;

moverEstrella();

});

moverEstrella();

</script>

</body>

</html>
