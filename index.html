    <center>


        <!DOCTYPE html>
        <html lang="es">

        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>LifeSync</title>

            <style>
                /* BODY: sirve para cambiar el fondo de toda la página */
                body {
                    margin: 0;
                    padding: 0;
                    font-family: Arial, Helvetica, sans-serif;
                    background: linear-gradient(to right, #c084fc, #60a5fa, #34d399);
                    height: 100vh;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }

                /* CONTENEDOR PRINCIPAL */
                .contenedor {
                    background-color: white;
                    width: 75%;
                    max-width: 900px;
                    padding: 40px;
                    border-radius: 25px;
                    text-align: center;
                    box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.25);
                }

                /* TÍTULO PRINCIPAL */
                h1 {
                    color: #7c3aed;
                    font-size: 45px;
                    margin-bottom: 10px;
                }

                /* SUBTÍTULO */
                h2 {
                    color: #0f172a;
                    font-size: 24px;
                    margin-bottom: 30px;
                }

                /* PÁRRAFOS */
                p {
                    font-size: 18px;
                    color: #374151;
                }

                /* CAJA DE INTEGRANTES */
                .integrantes {
                    background-color: #f3e8ff;
                    padding: 20px;
                    border-radius: 20px;
                    margin-top: 30px;
                }

                /* LISTA */
                ul {
                    list-style: none;
                    padding: 0;
                }

                li {
                    background-color: #ddd6fe;
                    margin: 10px;
                    padding: 12px;
                    border-radius: 12px;
                    font-weight: bold;
                    color: #4c1d95;
                }

                /* BOTÓN */
                button {
                    margin-top: 25px;
                    padding: 12px 25px;
                    border: none;
                    border-radius: 15px;
                    background-color: #7c3aed;
                    color: white;
                    font-size: 16px;
                    cursor: pointer;
                    transition: 0.3s;
                }

                /* EFECTO DEL BOTÓN */
                button:hover {
                    background-color: #5b21b6;
                    transform: scale(1.05);
                }
            </style>
        </head>

        <body>

            <div class="contenedor">

                <h1>LifeSync</h1>

                <h2>Rutina Inteligente con Emociones</h2>

                <p>
                    Una plataforma diseñada para organizar tu rutina diaria,
                    mejorar tus hábitos y ayudarte a expresar tus emociones.
                </p>

                    </ul>

                </div>

                <a href="inicio1.HTML">
                    <button>💜 Ingresar</button>
                </a>

            </div>

        </body>

        </html>
