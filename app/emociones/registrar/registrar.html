<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Emocional — LifeSync</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="registrar.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="contenedor" style="text-align:center;">
    <h1>😊 Registro Emocional</h1>
    <p>Completa esta pequeña encuesta emocional.</p>

    <form id="form-emocion" style="text-align:left;">
      <label>¿Cómo te sientes hoy?</label>
      <select id="emocion-select">
        <option value="feliz">😄 Feliz</option>
        <option value="triste">😢 Triste</option>
        <option value="estresado">😫 Estresado/a</option>
        <option value="motivado">😎 Motivado/a</option>
        <option value="calmado">😌 Calmado/a</option>
        <option value="ansioso">😰 Ansioso/a</option>
      </select>

      <label>¿Qué ocurrió hoy?</label>
      <textarea id="emocion-diario" rows="5" placeholder="Escribe cómo fue tu día..."></textarea>

      <button type="submit" class="btn btn-block">💜 Continuar</button>
    </form>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    document.getElementById('form-emocion').addEventListener('submit', function(e) {
      e.preventDefault();
      const usuario = LifeSyncDB.getUsuarioActivo() || 'Invitado';
      LifeSyncDB.addUserEntry(usuario, 'emociones', {
        emocion: document.getElementById('emocion-select').value,
        diario: document.getElementById('emocion-diario').value
      });
      window.location.href = '/app/emociones/historial/historial.html';
    });
  </script>

</body>
</html>
