<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Tarea — LifeSync</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="tareas.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="contenedor-wide">
    <div class="page-header">
      <h1>📋 Nueva Tarea</h1>
      <p class="subtitulo">Programa tus actividades académicas y personales con recordatorios inteligentes.</p>
    </div>

    <form id="form-tarea">
      <div class="form-row">
        <div class="form-group">
          <label>📌 Nombre de la tarea</label>
          <input type="text" id="tarea-nombre" placeholder="Ejemplo: Exposición de Ciencias" required>
        </div>

        <div class="form-group">
          <label>📂 Categoría</label>
          <select id="tarea-categoria">
            <option value="estudio">📚 Estudio</option>
            <option value="habito">💧 Hábito</option>
            <option value="meta">🎯 Meta personal</option>
            <option value="salud">🏥 Salud</option>
            <option value="social">👥 Social</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>📅 Fecha</label>
          <input type="date" id="tarea-fecha" required>
        </div>

        <div class="form-group">
          <label>⏰ Hora</label>
          <input type="time" id="tarea-hora" required>
        </div>

        <div class="form-group">
          <label>🎯 Prioridad</label>
          <select id="tarea-prioridad">
            <option value="baja">🟢 Baja</option>
            <option value="media" selected>🟡 Media</option>
            <option value="alta">🔴 Alta</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>🔔 Recordatorio</label>
        <select id="tarea-recordatorio">
          <option value="15">15 minutos antes</option>
          <option value="30" selected>30 minutos antes</option>
          <option value="60">1 hora antes</option>
          <option value="1440">1 día antes</option>
        </select>
      </div>

      <div class="form-group">
        <label>📝 Descripción</label>
        <textarea id="tarea-desc" rows="4" placeholder="Escribe detalles de tu tarea..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary-form">💜 Guardar Tarea</button>
        <a href="/app/planificacion/horario/horario.html" class="btn btn-secondary-form">📅 Ver Horario</a>
      </div>
    </form>

    <!-- Últimas tareas creadas -->
    <div class="recent-tasks" id="recent-tasks">
      <h2>Tareas recientes</h2>
      <div id="tasks-list"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="tareas.js"></script>

</body>
</html>
