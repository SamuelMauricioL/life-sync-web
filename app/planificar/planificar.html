<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificar — LifeSync</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="planificar.css">
  <link rel="stylesheet" href="asistente.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="page-content-wide">
    <div class="page-header">
      <h1>📋 Planificar</h1>
      <p class="subtitulo">Organiza tus tareas académicas y personales.</p>
    </div>

    <!-- Barra de acciones -->
    <div class="plan-actions-bar">
      <button class="btn" id="btn-nueva-tarea" onclick="abrirDialogTarea()">✏️ Nueva tarea</button>
      <button class="btn btn-outline" id="btn-conectar-classroom" onclick="conectarClassroom()">🔗 Conectar Classroom</button>
    </div>

    <!-- Vista semanal -->
    <div class="semana-section">
      <h2 class="section-title">📅 Vista semanal</h2>
      <div class="semana-info" id="semana-info"></div>
      <div class="horario-grid" id="horario-grid"></div>
    </div>

    <!-- Google Classroom -->
    <div class="classroom-section">
      <div class="classroom-header">
        <span class="classroom-icon">📚</span>
        <div>
          <h3>Google Classroom</h3>
          <p>Importa tus tareas de Classroom y obtén planes de estudio con IA.</p>
        </div>
        <button class="btn classroom-btn" id="btn-conectar-classroom" onclick="conectarClassroom()">🔗 Conectar</button>
      </div>
      <div id="classroom-tareas"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- Dialog: Nueva tarea -->
  <div id="dialog-tarea-overlay" class="dialog-overlay" style="display:none;">
    <div class="dialog-modal">
      <div class="dialog-header">
        <span class="dialog-icon">✏️</span>
        <h3>Nueva tarea</h3>
        <button class="dialog-close" onclick="cerrarDialogTarea()">✕</button>
      </div>
      <div class="dialog-body">
        <form id="form-tarea">
          <div class="form-row two">
            <div class="form-group">
              <label>📌 Nombre</label>
              <input type="text" id="tarea-nombre" placeholder="Ej: Exposición de Ciencias" required>
            </div>
            <div class="form-group">
              <label>📂 Categoría</label>
              <select id="tarea-categoria">
                <option value="estudio">📚 Estudio</option>
                <option value="habito">💧 Hábito</option>
                <option value="meta">🎯 Meta personal</option>
                <option value="salud">🏥 Salud</option>
                <option value="social">👥 Social</option>
              </select>
            </div>
          </div>

          <div class="form-row three">
            <div class="form-group">
              <label>📅 Fecha</label>
              <input type="date" id="tarea-fecha" required>
            </div>
            <div class="form-group">
              <label>⏰ Hora</label>
              <input type="time" id="tarea-hora">
            </div>
            <div class="form-group">
              <label>🎯 Prioridad</label>
              <select id="tarea-prioridad">
                <option value="baja">🟢 Baja</option>
                <option value="media" selected>🟡 Media</option>
                <option value="alta">🔴 Alta</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>📝 Descripción</label>
            <textarea id="tarea-desc" rows="3" placeholder="Detalles de la tarea..."></textarea>
          </div>

          <button type="submit" class="btn btn-block">💜 Guardar tarea</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Asistente Modal -->
  <div id="asistente-overlay" class="asistente-overlay" style="display:none;">
    <div class="asistente-modal">
      <div class="asistente-header">
        <span class="asistente-icon">🤖</span>
        <div>
          <h3>Planificador con IA</h3>
          <p id="asistente-subtitle">Analizando tu tarea...</p>
        </div>
        <button class="asistente-close" onclick="AsistenteModal.cerrar()">✕</button>
      </div>
      <div class="asistente-body" id="asistente-body"></div>
    </div>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/gemini.js"></script>
  <script src="/assets/js/classroom.js"></script>
  <script src="asistente.js"></script>
  <script src="planificar.js"></script>

</body>
</html>
