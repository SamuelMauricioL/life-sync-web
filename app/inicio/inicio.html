<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio — LifeSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="inicio.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="dash-container">

    <!-- Header -->
    <div class="dash-header">
      <div>
        <h1 class="dash-greeting">¡Buenos días, <span id="dash-usuario">Invitado</span>!</h1>
        <p class="dash-date" id="dash-fecha"></p>
      </div>
      <div class="dash-user-badge">
        <span>👤</span>
        <select id="dash-selector-usuario" onchange="cambiarUsuario(this.value)">
          <option value="">Seleccionar usuario</option>
        </select>
      </div>
    </div>

    <!-- Ánimo matutino inline -->
    <section class="mood-section">
      <h2>¿Cómo amaneces hoy?</h2>
      <div class="mood-row" id="mood-row">
        <button class="mood-btn" data-mood="feliz">😊</button>
        <button class="mood-btn" data-mood="motivado">🔥</button>
        <button class="mood-btn" data-mood="calmado">😌</button>
        <button class="mood-btn" data-mood="ansioso">😰</button>
        <button class="mood-btn" data-mood="cansado">😴</button>
        <button class="mood-btn" data-mood="triste">😢</button>
      </div>
      <p class="mood-feedback" id="mood-feedback"></p>
    </section>

    <!-- Racha (solo visible si ya registró ánimo hoy) -->
    <div class="dash-streak" id="dash-streak" style="display:none;">
      <span class="streak-fire" id="streak-emoji">🔥</span>
      <div>
        <span class="streak-count" id="streak-count">0</span>
        <span class="streak-label">días seguidos</span>
      </div>
    </div>

    <!-- Acceso rápido -->
    <h2 class="dash-section-title">Acceso rápido</h2>
    <div class="dash-actions">
      <a href="/app/planificar/planificar.html" class="action-card">
        <span class="action-icon">📋</span>
        <span class="action-label">Planificar</span>
      </a>
      <a href="/app/bienestar/historial/historial.html" class="action-card">
        <span class="action-icon">💜</span>
        <span class="action-label">Mi bienestar</span>
      </a>
    </div>

    <!-- Próximas tareas -->
    <h2 class="dash-section-title">Próximas tareas</h2>
    <div class="dash-reminders" id="dash-reminders">
      <p class="empty-state">No hay tareas pendientes ✨</p>
      <div id="reminders-list"></div>
    </div>

  </main>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="inicio.js"></script>

</body>
</html>
