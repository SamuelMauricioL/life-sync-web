<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recordatorios — LifeSync</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="crear.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="contenedor-wide">
    <h1>🔔 Centro de Recordatorios</h1>
    <p class="subtitulo">Organiza tus actividades importantes y recibe avisos para no olvidar nada.</p>

    <div class="card-grid" style="margin-bottom:35px;">
      <div class="card">
        <h3>📚 Estudios</h3>
        <p>Programa tareas, exposiciones y trabajos escolares.</p>
      </div>
      <div class="card">
        <h3>💧 Hábitos</h3>
        <p>Recuerda tomar agua, descansar o hacer ejercicio.</p>
      </div>
      <div class="card">
        <h3>🎯 Metas</h3>
        <p>Organiza objetivos importantes del día.</p>
      </div>
    </div>

    <form id="form-recordatorio" style="text-align:left;">
      <label>📌 Título del recordatorio:</label>
      <input type="text" id="recordatorio-titulo" placeholder="Ejemplo: Exposición de Ciencia" required>

      <label>📅 Fecha y hora:</label>
      <input type="datetime-local" id="recordatorio-fecha" required>

      <label>🔔 Tipo de notificación:</label>
      <select id="recordatorio-notif">
        <option>10 minutos antes</option>
        <option>30 minutos antes</option>
        <option>1 hora antes</option>
        <option>El mismo día</option>
      </select>

      <label>🎨 Nivel de prioridad:</label>
      <select id="recordatorio-prioridad">
        <option value="alta">🔴 Alta</option>
        <option value="media" selected>🟡 Media</option>
        <option value="baja">🟢 Baja</option>
      </select>

      <button type="submit" class="btn btn-block">💜 Guardar Recordatorio</button>
    </form>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/app.js"></script>
  <script>
    document.getElementById('form-recordatorio').addEventListener('submit', function(e) {
      e.preventDefault();
      const usuario = LifeSyncDB.getUsuarioActivo() || 'Invitado';
      LifeSyncDB.addUserEntry(usuario, 'recordatorios', {
        titulo: document.getElementById('recordatorio-titulo').value,
        fecha: document.getElementById('recordatorio-fecha').value,
        notificacion: document.getElementById('recordatorio-notif').value,
        prioridad: document.getElementById('recordatorio-prioridad').value
      });
      alert('✅ Recordatorio guardado exitosamente');
      window.location.href = '/app/recordatorios/lista/lista.html';
    });
  </script>

</body>
</html>
