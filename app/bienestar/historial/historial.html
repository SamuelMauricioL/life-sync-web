<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial Emocional — LifeSync</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="historial.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="page-content-wide">
    <div class="page-header">
      <h1>💜 Historial Emocional</h1>
      <p class="subtitulo">Así has estado esta semana. Registra tu emoción a diario para ver tu evolución.</p>
    </div>

    <!-- Timeline semanal -->
    <div class="timeline" id="timeline">
      <!-- Generado por historial.js -->
    </div>

    <!-- Barra de resumen -->
    <div class="mood-summary" id="mood-summary">
      <!-- Generado por historial.js -->
    </div>

    <!-- Insight / recomendación -->
    <div class="mood-insight" id="mood-insight">
      <!-- Generado por historial.js -->
    </div>

    <div class="historial-actions">
      <a href="/app/inicio/inicio.html" class="btn">🌅 Ir al inicio</a>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/storage.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="historial.js"></script>

</body>
</html>
