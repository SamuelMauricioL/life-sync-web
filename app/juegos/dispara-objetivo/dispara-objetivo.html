<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispara al Objetivo — LifeSync</title>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="dispara-objetivo.css">
</head>
<body>

  <div class="fullscreen">
    <h1 style="color:white;">🎯 Dispara al Objetivo</h1>
    <div class="score" id="puntos" style="color:white;">Puntos: 0</div>
    <div class="score" id="tiempo" style="color:white;">Tiempo: 30</div>
  </div>

  <div id="objetivo">🎯</div>

  <div id="final" style="text-align:center; color:white;">
    <h1>🏆 Juego Terminado</h1>
    <br>
    <p id="resultadoFinal" style="font-size:28px; color:white;"></p>
    <button class="btn" onclick="location.reload()">🔄 Jugar otra vez</button>
    <a href="/app/juegos/menu/menu.html"><button class="btn">⬅ Volver a Juegos</button></a>
  </div>

  <a href="/app/juegos/menu/menu.html" class="btn-fixed-left">⬅ Juegos</a>

  <script>
    let puntos = 0;
    let tiempo = 30;
    const objetivo = document.getElementById("objetivo");

    function moverObjetivo() {
      let x = Math.random() * (window.innerWidth - 100);
      let y = Math.random() * (window.innerHeight - 150);
      objetivo.style.left = x + "px";
      objetivo.style.top = y + "px";
    }

    objetivo.onclick = function() {
      puntos++;
      document.getElementById("puntos").innerHTML = "Puntos: " + puntos;
      moverObjetivo();
    };

    moverObjetivo();

    let contador = setInterval(function() {
      tiempo--;
      document.getElementById("tiempo").innerHTML = "Tiempo: " + tiempo;

      if (tiempo <= 0) {
        clearInterval(contador);
        objetivo.style.display = "none";
        document.getElementById("final").style.display = "block";
        document.getElementById("resultadoFinal").innerHTML = "⭐ Tu puntuación fue: " + puntos;
      }
    }, 1000);
  </script>

</body>
</html>
